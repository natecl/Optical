name: Deploy Backend To Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'types/**'
      - '.github/workflows/deploy-backend.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GAR_REPO: ${{ vars.GAR_REPO }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
      DEPLOY_SERVICE_ACCOUNT: ${{ vars.DEPLOY_SERVICE_ACCOUNT }}
      CLIENT_URL: ${{ vars.CLIENT_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          set -euo pipefail
          for key in GCP_PROJECT_ID GCP_REGION GAR_REPO CLOUD_RUN_SERVICE WIF_PROVIDER DEPLOY_SERVICE_ACCOUNT CLIENT_URL; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required GitHub variable: $key"
              exit 1
            fi
          done
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "Missing required GitHub secret: GEMINI_API_KEY"
            exit 1
          fi

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/cookmate-backend:${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$IMAGE_URI" ./server
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image "$IMAGE_URI" \
            --region "$GCP_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --timeout 3600 \
            --set-env-vars "NODE_ENV=production,PORT=8080,CLIENT_URL=${CLIENT_URL},GEMINI_API_KEY=${GEMINI_API_KEY}"

      - name: Print service URL
        run: |
          set -euo pipefail
          URL="$(gcloud run services describe "$CLOUD_RUN_SERVICE" --region "$GCP_REGION" --format='value(status.url)')"
          echo "Cloud Run URL: $URL"
